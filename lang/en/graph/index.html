<h1 class="kg-h1"><svg class="ico-graph" viewBox="0 0 25 25" aria-hidden="true"><g fill="none" stroke="currentColor" stroke-width="1.7"><line x1="4.5" y1="7" x2="20.5" y2="5"/><line x1="5.5" y1="9" x2="12" y2="20"/><line x1="20" y1="7" x2="13.5" y2="20"/></g><g fill="currentColor"><circle cx="4.5" cy="7" r="2.9"/><circle cx="20.5" cy="5" r="2.9"/><circle cx="12.5" cy="21" r="2.9"/></g></svg> Knowledge graph</h1>
<p class="kg-notice">⚠ Optimized for large screens — building the graph may take a moment.</p>

<div class="kg-controls">
    <div class="kg-row kg-filter-row">
        <span class="kg-search-wrap">
            <input type="text" id="kg-search-tag" class="kg-search-input" placeholder="Find a tag…" autocomplete="off">
            <div class="kg-suggest" id="kg-suggest-tag"></div>
        </span>
        <span class="kg-search-wrap">
            <input type="text" id="kg-search-law" class="kg-search-input" placeholder="Find a law…" autocomplete="off">
            <div class="kg-suggest" id="kg-suggest-law"></div>
        </span>
        <span class="kg-search-wrap">
            <input type="text" id="kg-search-sci" class="kg-search-input" placeholder="Find a scientist…" autocomplete="off">
            <div class="kg-suggest" id="kg-suggest-sci"></div>
        </span>
        <button type="button" id="kg-search-clear" title="Clear">✕</button>
        <span class="kg-sep"></span>
        <strong>Depth:</strong>
        <button type="button" id="kg-depth-minus">−</button>
        <span id="kg-depth-val">1</span>
        <button type="button" id="kg-depth-plus">+</button>
    </div>
    <div class="kg-chips" id="kg-chips-all"></div>
    <div class="kg-row"><strong>Nodes:</strong>
        <label><input type="checkbox" class="kg-kind" value="tag"> <span style="color:#6C5CE7">●</span> tags</label>
        <label><input type="checkbox" class="kg-kind" value="law" checked> <span style="color:#D64545">●</span> laws</label>
        <label><input type="checkbox" class="kg-kind" value="sci" checked> <span style="color:#2FA84F">●</span> scientists</label>
        <span class="kg-sep"></span>
        <strong>Edges:</strong>
        <label><input type="checkbox" class="kg-edge" value="tag-tag"> tag↔tag</label>
        <label><input type="checkbox" class="kg-edge" value="law-law"> law↔law</label>
        <label><input type="checkbox" class="kg-edge" value="sci-sci"> scientist↔scientist</label>
        <label><input type="checkbox" class="kg-edge" value="law-tag"> tag↔law</label>
        <label><input type="checkbox" class="kg-edge" value="sci-tag"> tag↔scientist</label>
        <label><input type="checkbox" class="kg-edge" value="law-sci" checked> law↔scientist</label>
        <label><input type="checkbox" class="kg-edge" value="law-influence" checked> law↔influence</label>
    </div>
    <div class="kg-row"><strong>Presets:</strong>
        <button type="button" onclick="kgPreset('core')">core</button>
        <button type="button" onclick="kgPreset('all')">all</button>
        <button type="button" onclick="kgPreset('tag-sci')">tag↔scientist</button>
        <button type="button" onclick="kgPreset('law-sci')">law↔scientist</button>
        <button type="button" onclick="kgPreset('law-tag')">tag↔law</button>
        <button type="button" onclick="kgPreset('tags')">tags</button>
        <button type="button" onclick="kgPreset('laws')">laws</button>
        <button type="button" onclick="kgPreset('sci')">scientists</button>
    </div>
</div>

<div id="kg-graph"><canvas id="kgcanvas"></canvas></div>
