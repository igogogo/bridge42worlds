<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bridge42worlds — alt design test</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&family=Source+Serif+4:opsz@8..60&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #fff; --text: #1a1a1a; --soft: #666; --muted: #999; --border: #e5e5e5; --link: #2563eb; --tag-bg: #f0f4ff; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; }

        /* ── top bar ── */
        .top-bar { max-width: 1200px; margin: 0 auto; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
        .logo { font-weight: 700; font-size: 18px; color: var(--text); text-decoration: none; }
        .nav a { margin-left: 20px; color: var(--soft); text-decoration: none; font-size: 13px; }
        .nav a:hover, .nav a.active { color: var(--link); }
        .badge { font-size: 11px; background: #fef3c7; color: #92400e; padding: 2px 8px; border-radius: 10px; margin-left: 8px; }

        /* ── search ── */
        .search-row { max-width: 1200px; margin: 20px auto 0; padding: 0 24px; }
        .search-box { width: 100%; padding: 12px 16px; border: 1px solid var(--border); border-radius: 8px; font-size: 15px; outline: none; }
        .search-box:focus { border-color: var(--link); }

        /* ── category bar ── */
        .cat-bar { max-width: 1200px; margin: 12px auto 0; padding: 0 24px; display: flex; flex-wrap: wrap; gap: 6px; }
        .cat-chip { font-size: 11px; padding: 4px 10px; border-radius: 14px; cursor: pointer; background: #f5f5f5; border: 1px solid var(--border); color: var(--soft); transition: all 0.15s; user-select: none; }
        .cat-chip:hover { border-color: var(--link); color: var(--link); }
        .cat-chip.active { background: var(--link); border-color: var(--link); color: #fff; }

        /* ── feed ── */
        .feed { max-width: 900px; margin: 24px auto; padding: 0 24px; display: flex; flex-direction: column; gap: 40px; }
        .article-card { display: flex; gap: 28px; align-items: flex-start; }
        .article-card:hover .card-title { color: var(--link); }
        .card-img-wrap { flex: 0 0 340px; aspect-ratio: 16/10; overflow: hidden; border-radius: 12px; background: #f0f0f0; }
        .card-img-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .card-img-wrap .no-img { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 12px; }
        .card-body { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 8px; padding-top: 4px; }
        .card-cat { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--link); }
        .card-title { font-family: 'Source Serif 4', serif; font-size: 22px; font-weight: 700; line-height: 1.25; color: var(--text); text-decoration: none; transition: color 0.15s; }
        .card-desc { font-size: 14px; line-height: 1.55; color: var(--soft); display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        .card-meta { font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
        .card-tags { display: flex; gap: 4px 8px; flex-wrap: wrap; font-size: 11px; color: var(--muted); }
        .card-tags span { cursor: pointer; }
        .card-tags span:hover { color: var(--link); }
        .card-likes { display: flex; align-items: center; gap: 4px; font-size: 13px; color: var(--soft); }
        .card-likes button { background: none; border: 1px solid var(--border); border-radius: 16px; padding: 4px 12px; cursor: pointer; font-size: 12px; color: var(--soft); transition: all 0.15s; }
        .card-likes button:hover { border-color: #e53e3e; color: #e53e3e; }
        .card-likes button.liked { background: #e53e3e; border-color: #e53e3e; color: #fff; }

        /* ── empty state ── */
        .empty { text-align: center; padding: 60px 0; color: var(--soft); font-size: 14px; }

        @media (max-width: 700px) {
            .article-card { flex-direction: column; gap: 14px; }
            .card-img-wrap { flex: 0 0 auto; width: 100%; aspect-ratio: 16/9; }
            .card-title { font-size: 18px; }
            .feed { gap: 28px; }
        }
    </style>
</head>
<body>

<div class="top-bar">
    <a href="/lang/ru/index.html" class="logo">bridge42worlds</a>
    <div class="nav">
        <a href="/lang/ru/index.html">main</a>
        <a href="/lang/ru/tags/">tags</a>
        <a href="/lang/ru/laws/">laws</a>
        <a href="/lang/ru/scientists/">scientists</a>
        <a href="/lang/ru/authors/">authors</a>
        <a href="/lang/ru/graph/">graph</a>
        <span class="badge">alt design</span>
    </div>
</div>

<div class="search-row">
    <input type="text" class="search-box" placeholder="Поиск статей..." id="search-input">
</div>
<div class="cat-bar" id="cat-bar"></div>
<div class="feed" id="feed"><div class="empty">Загрузка...</div></div>

<script>
var allArticles = [];
var activeCat = null;

var CAT_NAMES = {
    'astro-ph.CO': 'Cosmology', 'astro-ph.EP': 'Exoplanets', 'astro-ph.GA': 'Galaxies',
    'astro-ph.HE': 'High Energy', 'astro-ph.IM': 'Instrumentation', 'astro-ph.SR': 'Stellar',
    'gr-qc': 'General Relativity', 'hep-th': 'HEP Theory', 'quant-ph': 'Quantum Physics',
    'nucl-th': 'Nuclear Theory', 'hep-ph': 'HEP Phenomenology', 'physics.optics': 'Optics',
    'astro-ph.SR': 'Stars'
};

async function init() {
    try {
        var resp = await fetch('/lang/ru/articles-index.json');
        allArticles = (await resp.json()).sort(function(a,b){ return b.date.localeCompare(a.date); });
    } catch(e) { allArticles = []; }
    renderCats();
    renderFeed();
    document.getElementById('search-input').addEventListener('input', renderFeed);
}

function renderCats() {
    var counts = {};
    allArticles.forEach(function(a) { (a.categories||[]).forEach(function(c){ counts[c] = (counts[c]||0)+1; }); });
    var cats = Object.keys(counts).sort(function(a,b){ return counts[b] - counts[a]; });
    var html = '<span class="cat-chip' + (activeCat ? '' : ' active') + '" onclick="filterCat(null)">Все</span>';
    cats.forEach(function(c){
        html += '<span class="cat-chip' + (activeCat === c ? ' active' : '') + '" onclick="filterCat(\'' + c + '\')">' + (CAT_NAMES[c]||c) + '</span>';
    });
    document.getElementById('cat-bar').innerHTML = html;
}

function filterCat(cat) {
    activeCat = cat;
    renderCats();
    renderFeed();
}

function renderFeed() {
    var q = (document.getElementById('search-input').value || '').toLowerCase();
    var filtered = allArticles.filter(function(a){
        if (activeCat && !(a.categories||[]).includes(activeCat)) return false;
        if (q) {
            var hay = [a.title, a.oneliner, a.description, (a.authors||[]).join(' '), (a.tags||[]).join(' ')].join(' ').toLowerCase();
            if (hay.indexOf(q) === -1) return false;
        }
        return true;
    });

    if (!filtered.length) {
        document.getElementById('feed').innerHTML = '<div class="empty">Ничего не найдено</div>';
        return;
    }

    var now = new Date();
    var html = '';
    var lastDate = '';
    filtered.forEach(function(a){
        var d = a.date || '';
        if (d !== lastDate) {
            html += '<h3 style="font-size:14px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:' + (lastDate ? '8' : '0') + 'px">' + d + '</h3>';
            lastDate = d;
        }
        var cat = (a.categories||[])[0] || '';
        var catName = CAT_NAMES[cat] || cat;
        var imgPath = '/lang/ru/archive/' + a.date + '/' + a.id + '/ai.jpg';
        var thumbPath = '/lang/ru/archive/' + a.date + '/' + a.id + '/0.jpg';
        var desc = a.description || a.oneliner || '';
        var tags = (a.tags||[]).slice(0, 6);
        var tagHtml = tags.map(function(t){ return '<span>' + t.replace(/_/g, ' ') + '</span>'; }).join(' · ');

        html += '<div class="article-card">' +
            '<a class="card-img-wrap" href="' + (a.url || '/lang/ru/archive/' + a.date + '/' + a.id + '/index.html') + '">' +
                '<img src="' + imgPath + '" alt="" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\';">' +
                '<span class="no-img" style="display:none">📄</span>' +
            '</a>' +
            '<div class="card-body">' +
                (catName ? '<div class="card-cat">' + catName + '</div>' : '') +
                '<a class="card-title" href="' + (a.url || '/lang/ru/archive/' + a.date + '/' + a.id + '/index.html') + '">' + a.title + '</a>' +
                (desc ? '<div class="card-desc">' + desc + '</div>' : '') +
                '<div class="card-meta">' +
                    '<span>' + a.authors.slice(0,3).join(', ') + '</span>' +
                    (a.reading ? '<span>· ⏱ ' + a.reading + ' мин</span>' : '') +
                    '<span>· arXiv:' + a.id + '</span>' +
                '</div>' +
                (tagHtml ? '<div class="card-tags">' + tagHtml + '</div>' : '') +
                '<div class="card-likes"><button>♥</button></div>' +
            '</div>' +
        '</div>';
    });
    document.getElementById('feed').innerHTML = html;
}

document.addEventListener('DOMContentLoaded', init);
</script>

</body>
</html>
