<h1 class="kg-h1">🕸 Knowledge graph</h1>
<p class="kg-notice">⚠ Optimized for large screens — building the graph may take a moment.</p>

<div class="kg-controls">
    <div class="kg-row kg-filter-row">
        <span class="kg-search-wrap">
            <input type="text" id="kg-search-tag" class="kg-search-input" placeholder="Find a tag…" autocomplete="off">
            <div class="kg-suggest" id="kg-suggest-tag"></div>
        </span>
        <span class="kg-search-wrap">
            <input type="text" id="kg-search-law" class="kg-search-input" placeholder="Find a law…" autocomplete="off">
            <div class="kg-suggest" id="kg-suggest-law"></div>
        </span>
        <span class="kg-search-wrap">
            <input type="text" id="kg-search-sci" class="kg-search-input" placeholder="Find a scientist…" autocomplete="off">
            <div class="kg-suggest" id="kg-suggest-sci"></div>
        </span>
        <button type="button" id="kg-search-clear" title="Clear">✕</button>
        <span class="kg-sep"></span>
        <strong>Depth:</strong>
        <button type="button" id="kg-depth-minus">−</button>
        <span id="kg-depth-val">1</span>
        <button type="button" id="kg-depth-plus">+</button>
    </div>
    <div class="kg-chips" id="kg-chips-all"></div>
    <div class="kg-row"><strong>Nodes:</strong>
        <label><input type="checkbox" class="kg-kind" value="tag"> <span style="color:#7F77DD">●</span> tags</label>
        <label><input type="checkbox" class="kg-kind" value="law" checked> <span style="color:#C0392B">●</span> laws</label>
        <label><input type="checkbox" class="kg-kind" value="sci" checked> <span style="color:#2e7d32">●</span> scientists</label>
        <span class="kg-sep"></span>
        <strong>Edges:</strong>
        <label><input type="checkbox" class="kg-edge" value="tag-tag"> тег↔тег</label>
        <label><input type="checkbox" class="kg-edge" value="law-law"> закон↔закон</label>
        <label><input type="checkbox" class="kg-edge" value="sci-sci"> учёный↔учёный</label>
        <label><input type="checkbox" class="kg-edge" value="law-tag"> закон↔тег</label>
        <label><input type="checkbox" class="kg-edge" value="sci-tag"> учёный↔тег</label>
        <label><input type="checkbox" class="kg-edge" value="law-sci" checked> закон↔учёный</label>
        <label><input type="checkbox" class="kg-edge" value="law-influence" checked> закон↔влияние</label>
    </div>
    <div class="kg-row"><strong>Presets:</strong>
        <button type="button" onclick="kgPreset('core')">каркас</button>
        <button type="button" onclick="kgPreset('all')">всё</button>
        <button type="button" onclick="kgPreset('tag-sci')">тег↔учёный</button>
        <button type="button" onclick="kgPreset('law-sci')">закон↔учёный</button>
        <button type="button" onclick="kgPreset('law-tag')">закон↔тег</button>
        <button type="button" onclick="kgPreset('tags')">теги</button>
        <button type="button" onclick="kgPreset('laws')">законы</button>
        <button type="button" onclick="kgPreset('sci')">учёные</button>
    </div>
</div>

<div id="kg-graph"><canvas id="kgcanvas"></canvas></div>
