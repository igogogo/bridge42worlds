name: Daily Digest

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:
    inputs:
      date:
        description: 'Дата (YYYY-MM-DD), пусто = вчера'
        required: false
      mode:
        description: 'Режим'
        type: choice
        options:
          - daily
          - backfill
        default: 'daily'

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run generator
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          DATE: ${{ github.event.inputs.date || '' }}
          MODE: ${{ github.event.inputs.mode || 'daily' }}
        run: python generate.py

      - name: Commit and push
        run: |
          git config user.name "bridge42worlds-bot"
          git config user.email "bot@bridge42worlds.org"
          git add .
          git diff --quiet && git diff --staged --quiet || git commit -m "Daily update $(date +%Y-%m-%d)"
          git push