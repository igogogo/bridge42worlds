<!DOCTYPE html>
<html lang="$lang" dir="$dir">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>$graph_title — bridge42worlds</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&family=Source+Serif+4:opsz@8..60&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css?v=$asset_ver">
    <script data-goatcounter="https://$goatcounter.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
</head>
<body>

<div class="top-bar">
    <a href="/lang/$lang/index.html" class="logo">bridge42worlds</a>
    <div class="header-right">
        <div class="nav-links">
            <a href="/lang/$lang/index.html">main</a>
            <a href="/lang/$lang/tags/">tags</a>
            <a href="/lang/$lang/laws/">laws</a>
            <a href="/lang/$lang/scientists/">scientists</a>
            <a href="/lang/$lang/sections/">sections</a>
            <a href="/lang/$authors_lang/authors/">authors</a>
            <a href="/lang/$lang/graph/" class="active">graph</a>
            <a href="/lang/$lang/theory/">theory</a>
            <a href="/lang/$lang/favorites.html" title="$fav_title"><svg class="ico-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round" aria-hidden="true"><path d="M12 3.6l2.45 5 5.5.7-4 3.85 1 5.45-4.95-2.65-4.95 2.65 1-5.45-4-3.85 5.5-.7Z"/></svg></a>
        </div>
        $version_toggle_html
    </div>
</div>

<div class="langs" id="langs-bar"></div>

<h1 class="kg-h1"><svg class="ico-graph" viewBox="0 0 25 25" aria-hidden="true"><g fill="none" stroke="currentColor" stroke-width="1.7"><line x1="4.5" y1="7" x2="20.5" y2="5"/><line x1="5.5" y1="9" x2="12" y2="20"/><line x1="20" y1="7" x2="13.5" y2="20"/></g><g fill="currentColor"><circle cx="4.5" cy="7" r="2.9"/><circle cx="20.5" cy="5" r="2.9"/><circle cx="12.5" cy="21" r="2.9"/></g></svg> $graph_title</h1>
<p class="kg-notice">$graph_warning</p>

<div class="kg-controls">
    <div class="kg-row kg-filter-row">
        <span class="kg-search-wrap">
            <input type="text" id="kg-search-tag" class="kg-search-input" placeholder="$search_tag_placeholder" autocomplete="off">
            <div class="kg-suggest" id="kg-suggest-tag"></div>
        </span>
        <span class="kg-search-wrap">
            <input type="text" id="kg-search-law" class="kg-search-input" placeholder="$search_law_placeholder" autocomplete="off">
            <div class="kg-suggest" id="kg-suggest-law"></div>
        </span>
        <span class="kg-search-wrap">
            <input type="text" id="kg-search-sci" class="kg-search-input" placeholder="$search_sci_placeholder" autocomplete="off">
            <div class="kg-suggest" id="kg-suggest-sci"></div>
        </span>
        <button type="button" id="kg-search-clear" title="$clear_label">✕</button>
        <span class="kg-sep"></span>
        <strong>$depth_label</strong>
        <button type="button" id="kg-depth-minus">−</button>
        <span id="kg-depth-val">1</span>
        <button type="button" id="kg-depth-plus">+</button>
    </div>
    <div class="kg-chips" id="kg-chips-all"></div>
    <div class="kg-row"><strong>$nodes_label</strong>
        <label><input type="checkbox" class="kg-kind" value="tag"> <span style="color:#6C5CE7">●</span> $tags_label</label>
        <label><input type="checkbox" class="kg-kind" value="law" checked> <span style="color:#D64545">●</span> $laws_label</label>
        <label><input type="checkbox" class="kg-kind" value="sci" checked> <span style="color:#2FA84F">●</span> $scientists_label</label>
        <span class="kg-sep"></span>
        <strong>$edges_label</strong>
        <label><input type="checkbox" class="kg-edge" value="tag-tag"> $edge_tag_tag</label>
        <label><input type="checkbox" class="kg-edge" value="law-law"> $edge_law_law</label>
        <label><input type="checkbox" class="kg-edge" value="sci-sci"> $edge_sci_sci</label>
        <label><input type="checkbox" class="kg-edge" value="law-tag"> $edge_tag_law</label>
        <label><input type="checkbox" class="kg-edge" value="sci-tag"> $edge_tag_sci</label>
        <label><input type="checkbox" class="kg-edge" value="law-sci" checked> $edge_law_sci</label>
        <label><input type="checkbox" class="kg-edge" value="law-influence" checked> $edge_law_influence</label>
    </div>
    <div class="kg-row"><strong>$presets_label</strong>
        <button type="button" onclick="kgPreset('core')">$preset_core</button>
        <button type="button" onclick="kgPreset('all')">$preset_all</button>
        <button type="button" onclick="kgPreset('tag-sci')">$edge_tag_sci</button>
        <button type="button" onclick="kgPreset('law-sci')">$edge_law_sci</button>
        <button type="button" onclick="kgPreset('law-tag')">$edge_tag_law</button>
        <button type="button" onclick="kgPreset('tags')">$tags_label</button>
        <button type="button" onclick="kgPreset('laws')">$laws_label</button>
        <button type="button" onclick="kgPreset('sci')">$scientists_label</button>
    </div>
</div>

<div id="kg-graph"><canvas id="kgcanvas"></canvas></div>

<footer><p>bridge42worlds — $footer_text · <a href="/lang/$lang/archive/">archive</a> · <a href="/status.html" class="status-badge" title="Status">42</a></p></footer>
<script src="/js/likes.js?v=$asset_ver"></script>
<script src="/js/search.js?v=$asset_ver"></script>
<script src="/js/force-graph.js?v=$asset_ver"></script>
<script src="/js/knowledge-graph.js?v=$asset_ver"></script>
</body>
</html>
