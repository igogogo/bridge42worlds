<!DOCTYPE html>
<html lang="$lang">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>$laws_title — bridge42worlds</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&family=Source+Serif+4:opsz@8..60&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css?v=$asset_ver">
    <script data-goatcounter="https://$goatcounter.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
</head>
<body>

<div class="top-bar">
    <a href="/lang/$lang/index.html" class="logo">bridge42worlds</a>
    <div class="header-right">
        <div class="nav-links">
            <a href="/lang/$lang/index.html">main</a>
            <a href="/lang/$lang/tags/">tags</a>
            <a href="/lang/$lang/laws/" class="active">laws</a>
            <a href="/lang/$lang/scientists/">scientists</a>
            <a href="/lang/$authors_lang/authors/">authors</a>
            <a href="/lang/$lang/graph/">graph</a>
            <a href="/lang/$authors_lang/theory/">theory</a>
            <a href="/lang/$lang/favorites.html" title="Избранное">★</a>
            <a href="/lang/$lang/about.html">about</a>
        </div>
        $version_toggle_html
    </div>
</div>

<div class="langs" id="langs-bar"></div>

<h1>⚖️ $laws_title</h1>
<div class="subtitle">$laws_subtitle</div>

<div class="search-row">
    <input type="text" placeholder="$search_placeholder" oninput="filterLaws(this.value)">
</div>

<div class="view-toggle" id="view-toggle">
    <button type="button" id="view-list" class="active" aria-label="List">☰</button>
    <button type="button" id="view-graph" aria-label="Graph">◉</button>
    <a href="/lang/$authors_lang/laws/audit.html" class="view-audit-link" title="Аудит картинок">🖼</a>
</div>

<div class="tag-cloud" id="law-cloud">$laws_cloud_html</div>
<div id="laws-graph" style="display:none">
    <div class="mini-graph-filters">$mini_graph_filters_html</div>
    <div class="mini-graph mini-graph--full" data-node="">
        <canvas id="minigraph"></canvas>
    </div>
</div>

<footer><p>bridge42worlds — $footer_text · <a href="/lang/$lang/archive/">archive</a></p></footer>
<script src="/js/likes.js?v=$asset_ver"></script>
<script src="/js/search.js?v=$asset_ver"></script>
<script src="/js/force-graph.js?v=$asset_ver"></script>
<script src="/js/mini-graph.js?v=$asset_ver"></script>
<script>
function filterLaws(q) {
    q = (q || '').toLowerCase().trim();
    var container = document.getElementById('law-cloud');
    var group = null, groupHasVisible = false;
    Array.prototype.forEach.call(container.children, function(el) {
        if (el.classList.contains('cloud-group-label')) {
            if (group) group.style.display = groupHasVisible ? '' : 'none';
            group = el; groupHasVisible = false;
            return;
        }
        if (!el.matches('.law-item')) return;
        var visible = !q || el.textContent.toLowerCase().indexOf(q) !== -1;
        el.style.display = visible ? '' : 'none';
        if (visible) groupHasVisible = true;
    });
    if (group) group.style.display = groupHasVisible ? '' : 'none';
}
(function(){
  var lb=document.getElementById('view-list'),gb=document.getElementById('view-graph');
  var cloud=document.getElementById('law-cloud'),graph=document.getElementById('laws-graph');
  function set(g){cloud.style.display=g?'none':'';graph.style.display=g?'block':'none';
    gb.classList.toggle('active',g);lb.classList.toggle('active',!g);
    if(g&&window.__miniResize)window.__miniResize();
    try{localStorage.setItem('b42_lawview',g?'graph':'list');}catch(e){}}
  lb.onclick=function(){set(false);};gb.onclick=function(){set(true);};
  try{if(localStorage.getItem('b42_lawview')==='graph')set(true);}catch(e){}
})();
</script>
</body>
</html>
