<!DOCTYPE html>
<html lang="$lang" dir="$dir">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>$laws_title — bridge42worlds</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&family=Source+Serif+4:opsz@8..60&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css?v=$asset_ver">
    <script data-goatcounter="https://$goatcounter.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="apple-touch-icon" href="/favicon.png">
</head>
<body>

<div class="top-bar">
    <a href="/lang/$lang/index.html" class="logo">bridge42worlds</a>
    <div class="header-right">
        <div class="nav-links">
            <a href="/lang/$lang/index.html">main</a>
            <a href="/lang/$lang/tags/">tags</a>
            <a href="/lang/$lang/laws/" class="active">laws</a>
            <a href="/lang/$lang/scientists/">scientists</a>
            <a href="/lang/$lang/sections/">sections</a>
            <a href="/lang/$authors_lang/authors/">authors</a>
            <a href="/lang/$lang/graph/">graph</a>
            <a href="/lang/$lang/theory/">theory</a>
            <a href="/lang/$lang/favorites.html" title="$fav_title"><svg class="ico-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round" aria-hidden="true"><path d="M12 3.6l2.45 5 5.5.7-4 3.85 1 5.45-4.95-2.65-4.95 2.65 1-5.45-4-3.85 5.5-.7Z"/></svg></a>
        </div>
        $version_toggle_html
    </div>
</div>

<div class="langs" id="langs-bar"></div>

<h1><svg class="ico-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="12" y1="5" x2="12" y2="19"/><line x1="7" y1="7.2" x2="17" y2="7.2"/><path d="M7 7.2 5 11.5h4Z"/><path d="M17 7.2 15 11.5h4Z"/><line x1="8" y1="19.5" x2="16" y2="19.5"/></svg>️ $laws_title</h1>
<div class="subtitle">$laws_subtitle</div>

<div class="search-row">
    <input type="text" placeholder="$search_placeholder" oninput="filterLaws(this.value)">
</div>

<div class="view-toggle" id="view-toggle">
    <button type="button" id="view-structured" class="active" aria-label="Sections">▤</button>
    <button type="button" id="view-treemap" aria-label="Map">▦</button>
    <button type="button" id="view-list" aria-label="List">☰</button>
    <button type="button" id="view-graph" aria-label="Graph">◉</button>
</div>

<div id="treeview"></div>
<div id="treemap" style="display:none"></div>
<div class="tag-cloud" id="law-cloud" style="display:none">$laws_cloud_html</div>
<div id="laws-graph" style="display:none">
    <div class="mini-graph-filters">$mini_graph_filters_html</div>
    <div class="mini-graph mini-graph--full" data-node="">
        <canvas id="minigraph"></canvas>
    </div>
</div>

<footer><p>bridge42worlds · <span class="status-badge" title="42">42</span></p></footer>
<script src="/js/likes.js?v=$asset_ver"></script>
<script src="/js/search.js?v=$asset_ver"></script>
<script src="/js/force-graph.js?v=$asset_ver"></script>
<script src="/js/mini-graph.js?v=$asset_ver"></script>
<script>window.__TREEMAP = $treemap_data;</script>
<script src="/js/treeview.js?v=$asset_ver"></script>
<script src="/js/treemap.js?v=$asset_ver"></script>
<script>
function filterLaws(q) {
    q = (q || '').toLowerCase().trim();
    var container = document.getElementById('law-cloud');
    var group = null, groupHasVisible = false;
    Array.prototype.forEach.call(container.children, function(el) {
        if (el.classList.contains('cloud-group-label')) {
            if (group) group.style.display = groupHasVisible ? '' : 'none';
            group = el; groupHasVisible = false;
            return;
        }
        if (!el.matches('.law-item')) return;
        var visible = !q || el.textContent.toLowerCase().indexOf(q) !== -1;
        el.style.display = visible ? '' : 'none';
        if (visible) groupHasVisible = true;
    });
    if (group) group.style.display = groupHasVisible ? '' : 'none';
}
(function(){
  var V={structured:'treeview',treemap:'treemap',list:'law-cloud',graph:'laws-graph'};
  var B={structured:'view-structured',treemap:'view-treemap',list:'view-list',graph:'view-graph'};
  function set(name){
    for(var k in V){var el=document.getElementById(V[k]);if(el)el.style.display=(k===name)?'':'none';
      var b=document.getElementById(B[k]);if(b)b.classList.toggle('active',k===name);}
    if(name==='graph'&&window.__miniResize)window.__miniResize();
    if(name==='treemap'&&window.__treemapRender)window.__treemapRender();
    try{localStorage.setItem('b42_lawview',name);}catch(e){}
  }
  Object.keys(B).forEach(function(k){document.getElementById(B[k]).onclick=function(){set(k);};});
  var saved='structured';try{saved=localStorage.getItem('b42_lawview')||'structured';}catch(e){}
  if(!V[saved])saved='structured';
  set(saved);
})();
</script>
</body>
</html>
