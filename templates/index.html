<!DOCTYPE html>
<html lang="$lang" dir="$dir">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bridge42worlds — Science Made Simple</title>
    <link rel="alternate" type="application/atom+xml" title="bridge42worlds ($lang)" href="/feed-$lang.xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&family=Source+Serif+4:opsz@8..60&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css?v=$asset_ver">
    <script data-goatcounter="https://$goatcounter.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="apple-touch-icon" href="/favicon.png">
</head>
<body>
<div class="top-bar">
    <div class="brand-row">
        <span class="logo-wrap">
            <a href="/lang/$lang/index.html" class="logo">bridge42worlds</a><button type="button" id="intro-toggle" class="logo-info" title="$about_title">i</button>
            <div class="intro-popup" id="intro-popup">
                <p class="home-intro" id="home-intro">$intro_html</p>
            </div>
        </span>
        <div class="hdr-icons">
            <div class="search-bar">
                <button type="button" id="search-toggle-btn" class="cal-btn" title="$search_placeholder"><svg class="ico-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" aria-hidden="true"><circle cx="10.5" cy="10.5" r="6"/><line x1="14.9" y1="14.9" x2="20" y2="20"/></svg></button>
                <div class="search-panel" id="search-panel">
                    <div class="search-row">
                        <input type="text" class="search-box" placeholder="$search_placeholder" oninput="doSearch(this.value)">
                        <button type="button" class="search-clear" onclick="clearSearch()" title="Clear">✕</button>
                    </div>
                    <div class="search-hint">$search_hint</div>
                    <label class="express-filter"><input type="checkbox" id="express-filter-toggle"><span id="express-filter-label"></span></label>
                </div>
            </div>
            <div class="cal-bar">
                <button type="button" id="calendar-btn" class="cal-btn" title="$calendar_title"><svg class="ico-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="4" y="5.5" width="16" height="15" rx="2.6"/><line x1="4" y1="9.5" x2="20" y2="9.5"/><line x1="8" y1="3.4" x2="8" y2="6.6"/><line x1="16" y1="3.4" x2="16" y2="6.6"/></svg></button>
                <div class="calendar-panel" id="calendar-panel"></div>
            </div>
        </div>
    </div>
    <div class="header-right">
        <div class="nav-links">
            <a href="/lang/$lang/index.html" class="active">main</a>
            <a href="/lang/$lang/tags/">tags</a>
            <a href="/lang/$lang/laws/">laws</a>
            <a href="/lang/$lang/scientists/">scientists</a>
            <a href="/lang/$lang/sections/">sections</a>
            <a href="/lang/$authors_lang/authors/">authors</a>
            <a href="/lang/$lang/graph/">graph</a>
            <a href="/lang/$lang/theory/">theory</a>
            <a href="/lang/$lang/favorites.html" title="$fav_title"><svg class="ico-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round" aria-hidden="true"><path d="M12 3.6l2.45 5 5.5.7-4 3.85 1 5.45-4.95-2.65-4.95 2.65 1-5.45-4-3.85 5.5-.7Z"/></svg></a>
        </div>
        $version_toggle_html
    </div>
</div>
<div class="langs-row">
    <div class="langs" id="langs-bar"></div>
</div>
<script>
(function () {
    var KEY = 'b42_intro_seen';
    var popup = document.getElementById('intro-popup'), btn = document.getElementById('intro-toggle');
    if (!popup || !btn) return;
    var seen = false;
    try { seen = localStorage.getItem(KEY) === '1'; } catch (e) {}
    function setOpen(v) { popup.classList.toggle('open', v); btn.classList.toggle('active', v); }
    setOpen(!seen);
    if (!seen) { try { localStorage.setItem(KEY, '1'); } catch (e) {} }
    btn.addEventListener('click', function (e) { e.stopPropagation(); setOpen(!popup.classList.contains('open')); });
    document.addEventListener('click', function (e) {
        if (popup.classList.contains('open') && !popup.contains(e.target) && e.target !== btn) setOpen(false);
    });
})();
</script>
<div class="category-bar" id="category-bar"></div>
<div class="site-stats" id="site-stats"></div>
<div class="filters" id="active-filters"></div>
<div id="search-results"><div class="b42-loader">$loading_text</div></div>
<footer><p>bridge42worlds · <a href="/feed-$lang.xml">RSS</a> · <span class="status-badge" title="42">42</span></p></footer>
<script src="/js/likes.js?v=$asset_ver"></script>
<script src="/js/search.js?v=$asset_ver"></script>
</body>
</html>
