<!DOCTYPE html>
<html lang="$lang" dir="$dir">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>$section_name — bridge42worlds</title>
    <meta name="description" content="$section_desc">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&family=Source+Serif+4:opsz@8..60&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css?v=$asset_ver">
    <script data-goatcounter="https://$goatcounter.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
</head>
<body>

<div class="top-bar">
    <a href="/lang/$lang/index.html" class="logo">bridge42worlds</a>
    <div class="header-right">
        <div class="nav-links">
            <a href="/lang/$lang/index.html">main</a>
            <a href="/lang/$lang/tags/">tags</a>
            <a href="/lang/$lang/laws/">laws</a>
            <a href="/lang/$lang/scientists/">scientists</a>
            <a href="/lang/$lang/sections/" class="active">sections</a>
            <a href="/lang/$authors_lang/authors/">authors</a>
            <a href="/lang/$lang/graph/">graph</a>
            <a href="/lang/$lang/theory/">theory</a>
            <a href="/lang/$lang/favorites.html" title="$fav_title"><svg class="ico-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round" aria-hidden="true"><path d="M12 3.6l2.45 5 5.5.7-4 3.85 1 5.45-4.95-2.65-4.95 2.65 1-5.45-4-3.85 5.5-.7Z"/></svg></a>
        </div>
        $version_toggle_html
    </div>
</div>

<div class="langs" id="langs-bar"></div>

<div class="tag-header">
    <div class="tag-title-row">
        <h1>$section_name <span class="law-type">$section_id</span></h1>
        <div class="search-bar">
            <button type="button" id="search-toggle-btn" class="cal-btn" title="$search_placeholder"><svg class="ico-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" aria-hidden="true"><circle cx="10.5" cy="10.5" r="6"/><line x1="14.9" y1="14.9" x2="20" y2="20"/></svg></button>
            <div class="search-panel" id="search-panel">
                <div class="search-row">
                    <input type="text" class="search-box" placeholder="$search_placeholder" oninput="doSearch(this.value)">
                    <button type="button" class="search-clear" onclick="clearSearch()" title="Clear">✕</button>
                </div>
                <div class="search-hint">$search_hint</div>
            </div>
        </div>
    </div>
    $tag_stats_html
    <p class="section-desc">$section_desc</p>
</div>

<div class="entity-body">
<div class="filters" id="active-filters"></div>
</div>

<h2 class="section-title" id="article-list">$articles_label</h2>
<div id="search-results" class="entity-list" data-context-category="$section_id">$articles_list_html</div>

<footer><p>bridge42worlds — $footer_text · <a href="/lang/$lang/archive/">archive</a> · <a href="/status.html" class="status-badge" title="Status">42</a></p></footer>
<script src="/js/likes.js?v=$asset_ver"></script>
<script src="/js/search.js?v=$asset_ver"></script>
</body>
</html>
